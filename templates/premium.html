<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Upgrade Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
background:#050505;
color:white;
font-family:'Poppins',sans-serif;
}

.bg1{
position:fixed;
width:700px;
height:700px;
background:radial-gradient(circle,rgba(255,0,0,0.18),transparent 70%);
top:-200px;
right:-200px;
z-index:-1;
}

.container{
max-width:700px;
margin:auto;
padding:40px 20px;
}

.box{
background:linear-gradient(145deg,#111,#1b1b1b);
border:1px solid rgba(255,0,0,0.15);
border-radius:30px;
padding:45px;
box-shadow:
0 0 30px rgba(255,0,0,0.15),
0 10px 40px rgba(0,0,0,0.7);
text-align:center;
}

h2{
font-size:42px;
color:#ff1a1a;
}

p{
color:#ddd;
line-height:1.8;
}

.qr-box{
margin-top:30px;
}

.qr-box img{
width:220px;
border-radius:20px;
border:4px solid rgba(255,0,0,0.2);
transition:0.3s;
}

.qr-box img:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

input{
width:100%;
padding:18px;
margin-top:18px;
border:none;
border-radius:14px;
background:#111;
color:white;
font-size:17px;
border:1px solid rgba(255,0,0,0.2);
box-sizing:border-box;
}

button{
width:100%;
margin-top:25px;
padding:18px;
border:none;
border-radius:15px;
background:linear-gradient(135deg,#ff0000,#a80000);
color:white;
font-size:20px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

.upi{
margin-top:20px;
font-size:20px;
}

.upi a{
color:#ff4d4d;
text-decoration:none;
font-weight:600;
}

.note{
margin-top:20px;
color:#bbb;
line-height:1.8;
}

</style>

</head>

<body>

<div class="bg1"></div>

<div class="container">

<div class="box">

<h2>
👑 Upgrade Premium
</h2>

<p>
Unlock unlimited uploads, faster processing
and premium access.
</p>

<div class="qr-box">

<a href="upi://pay?pa=ujjaval8084-1@okicici&pn=NursingStoree&cu=INR">

<img src="/static/qr.png">

</a>

</div>

<div class="upi">

UPI ID:
<br><br>

<a href="upi://pay?pa=ujjaval8084-1@okicici&pn=NursingStoree&cu=INR">

ujjaval8084-1@okicici

</a>

</div>

<div class="note">

After payment fill all details carefully.

</div>

<form onsubmit="submitForm(event)">

<input
type="text"
id="name"
placeholder="Enter your name"
required>

<input
type="email"
id="email"
placeholder="Enter your email"
required>

<input
type="text"
id="transactionId"
placeholder="Enter UTR / UPI Ref No / Transaction ID"
required>

<button type="submit">

🚀 Submit Payment Details

</button>

</form>

<div class="note">

Wait 12-24 hours after successful payment for approval.

</div>

</div>

</div>

<script>

if(!localStorage.getItem("userId")){

localStorage.setItem(
"userId",
"user_"+Math.random().toString(36).substring(7)
);

}

async function submitForm(e){

e.preventDefault();

let name =
document.getElementById("name").value;

let email =
document.getElementById("email").value;

let transactionId =
document.getElementById("transactionId").value;

if(!name || !email || !transactionId){

alert("All fields required");

return;

}

try{

let res = await fetch("/subscribe",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,

email:email,

transaction_id:transactionId,

user_id:
localStorage.getItem("userId")

})

});

let data = await res.json();

if(data.error){

alert(data.error);

return;

}

alert(data.msg);

window.location="/";

}catch(err){

console.log(err);

alert("Submission failed");

}

}

</script>

</body>
</html>
